<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rafti Ke Nabashi</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      background: linear-gradient(-45deg, #0f0f0f, #1a0033, #000000, #001a33);
      background-size: 400% 400%;
      animation: bg 10s ease infinite;
    }

    @keyframes bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .box {
      width: 90%;
      max-width: 420px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    /* 🔥 HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding: 10px 0;
    }

    .left, .right {
      width: 40%;
      text-align: center;
    }

    .middle {
      width: 20%;
      font-size: 22px;
      opacity: 0.6;
    }

    .en {
      font-size: 12px;
      opacity: 0.6;
    }

    .fa {
      font-size: 14px;
      font-weight: bold;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .download-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 18px;
      border-radius: 10px;
      background: #00ffff;
      color: black;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 0 15px #00ffff;
      transition: 0.3s;
    }

    .download-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #00ffff;
    }
  </style>
</head>

<body>

  <div class="box">

    <!-- 🔥 HEADER -->
    <div class="header">
      <div class="left">
        <div class="en">Masiha Favaran</div>
        <div class="fa">مسیحا فوران</div>
      </div>

      <div class="middle">|</div>

      <div class="right">
        <div class="en">Rafti Ke Nabashi</div>
        <div class="fa">رفتی که نباشی</div>
      </div>
    </div>

    <!-- عکس آهنگ -->
    <img src="CoverMusic.png" alt="cover">

    <!-- پلیر -->
    <audio controls>
      <source src="RaftiKeNabashi.mp3" type="audio/mpeg">
    </audio>

    <!-- دانلود -->
    <a class="download-btn" href="RaftiKeNabashi.mp3" download>
      ⬇ دانلود با کیفیت عالی (320 - 128)
    </a>

  </div>

</body>
</html>

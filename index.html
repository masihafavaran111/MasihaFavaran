<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masiha Favaran</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      background: linear-gradient(-45deg, #0f0f0f, #1a0033, #000000, #001a33);
      background-size: 400% 400%;
      animation: bg 10s ease infinite;
    }

    @keyframes bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .box {
      width: 90%;
      max-width: 500px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      line-height: 1.8;
      opacity: 0.85;
    }

    /* ☰ منو */
    .menu {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 28px;
      cursor: pointer;
      user-select: none;
    }

    .menu-box {
      display: none;
      position: absolute;
      top: 55px;
      left: 15px;
      background: rgba(0,0,0,0.75);
      padding: 10px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }

    .menu-box a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 8px;
      font-size: 14px;
    }

    .menu-box a:hover {
      color: #00ffff;
    }
  </style>
</head>

<body>

  <!-- ☰ -->
  <div class="menu" onclick="toggleMenu()">☰</div>

  <div id="menuBox" class="menu-box">
    <a href="index.html">خانه</a>
    <a href="track1.html">رفتی که نباشی</a>
  </div>

  <!-- BOX -->
  <div class="box">

    <h1>مسیحا فوران</h1>

    <p>
      مسیحا فوران یک هنرمند مستقل در سبک آر اند بی و رپ است.<br><br>

      او تنظیم، میکس و مسترینگ موزیک‌هایش را خودش انجام می‌دهد.<br><br>

      با فضای دارک و ملودی‌های خاص، سعی می‌کند موزیک‌هایی بسازد که احساس واقعی منتقل کنند.<br><br>

      🎧 Hip-Hop / Rap / R&B<br>
      📍 ایران
    </p>

  </div>

  <script>
    function toggleMenu() {
      var menu = document.getElementById("menuBox");
      menu.style.display = (menu.style.display === "block") ? "none" : "block";
    }
  </script>

</body>
</html>

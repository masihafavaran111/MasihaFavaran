<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <meta name="description" content="Album - Coming Soon">
  <title>Albums | Masiha Favaran</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: radial-gradient(circle at top, #1a0033, #000000 60%, #000);
      overflow-x: hidden;
    }

    body::before, body::after {
      content: "";
      position: fixed;
      filter: blur(120px);
      z-index: -1;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: rgba(0,255,255,0.08);
      top: -100px;
      left: -100px;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: rgba(255,0,100,0.08);
      bottom: -100px;
      right: -100px;
    }

    /* TOP MENU (دقیق مثل index) */
    .top-menu {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 35px;

      padding: 12px 28px;
      border-radius: 999px;

      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 0 30px rgba(0,0,0,0.6);

      z-index: 9999;
      align-items: center;
    }

    .top-menu a,
    .dropbtn {
      color: white;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.85;
      transition: 0.25s ease;
      cursor: pointer;
      background: none;
      border: none;
    }

    .top-menu a:hover,
    .dropbtn:hover {
      opacity: 1;
      color: #00ffff;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 35px;
      left: 0;

      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);

      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;

      min-width: 170px;
      overflow: hidden;
    }

    .dropdown-content a {
      display: block;
      padding: 10px 14px;
      font-size: 13px;
      color: white;
      text-decoration: none;
    }

    .dropdown-content a:hover {
      background: rgba(0,255,255,0.12);
      color: #00ffff;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    /* CENTER */
    .center {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding-top: 80px;
    }

    .center h1 {
      font-size: 60px;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #ff3b7b, #7b3bff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .center p {
      margin-top: 10px;
      color: #aaa;
    }

  </style>
</head>

<body>

  <!-- MENU (دقیق مثل index) -->
  <div class="top-menu">
    <a href="index.html">Home</a>

    <div class="dropdown">
      <span class="dropbtn">Tracks</span>

      <div class="dropdown-content">
        <a href="track2.html">Infidel Coward</a>
        <a href="track1.html">Rafti Ke Nabashi</a>
      </div>
    </div>

    <a href="album.html" style="color:#00ffff;">Albums</a>
    <a href="#">Contact</a>
  </div>

  <!-- CENTER -->
  <div class="center">
    <h1>COMING SOON</h1>
    <p>New album is on the way</p>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rafti Ke Nabashi</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      background: linear-gradient(-45deg, #0f0f0f, #1a0033, #000000, #001a33);
      background-size: 400% 400%;
      animation: bg 10s ease infinite;
    }

    @keyframes bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .box {
      width: 90%;
      max-width: 420px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .left, .right {
      width: 40%;
    }

    .middle {
      width: 20%;
      font-size: 22px;
      opacity: 0.6;
    }

    .en {
      font-size: 12px;
      opacity: 0.7;
    }

    .fa {
      font-size: 14px;
      font-weight: bold;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .download {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 18px;
      border-radius: 10px;
      background: #00ffff;
      color: black;
      font-weight: bold;
      text-decoration: none;
    }
.menu {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 28px;
  cursor: pointer;
  user-select: none;
  z-index: 999;
      };
    }

    .menu-box {
      display: none;
      position: absolute;
      top: 55px;
      left: 15px;
      background: rgba(0,0,0,0.75);
      padding: 10px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }

    .menu-box a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 8px;
      font-size: 14px;
    }

    .menu-box a:hover {
      color: #00ffff;
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <div class="menu" onclick="toggleMenu()">☰</div>

  <div id="menuBox" class="menu-box">
    <a href="index.html">بیوگرافی فوران</a>
    <a href="track1.html">رفتی که نباشی</a>
  </div>

  <!-- BOX -->
  <div class="box">

    <!-- HEADER -->
    <div class="header">
      <div class="left">
        <div class="en">Masiha Favaran</div>
        <div class="fa">مسیحا فوران</div>
      </div>

      <div class="middle">|</div>

      <div class="right">
        <div class="en">Rafti Ke Nabashi</div>
        <div class="fa">رفتی که نباشی</div>
      </div>
    </div>

    <!-- COVER -->
    <img src="CoverMusic.png" alt="cover">

    <!-- AUDIO -->
    <audio controls>
      <source src="RaftiKeNabashi.mp3" type="audio/mpeg">
    </audio>

    <!-- DOWNLOAD -->
    <a class="download" href="RaftiKeNabashi.mp3" download>
    دانلود با کیفیت عالی
    </a>

  </div>

  <script>
    function toggleMenu() {
      var menu = document.getElementById("menuBox");
      menu.style.display = (menu.style.display === "block") ? "none" : "block";
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rafti Ke Nabashi</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: linear-gradient(-45deg, #0f0f0f, #1a0033, #000000, #001a33);
      background-size: 400% 400%;
      animation: bg 10s ease infinite;
      overflow-x: hidden;
      padding-bottom: 140px; /* مهم برای اسلایدر */
    }

    @keyframes bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .box {
      width: 90%;
      max-width: 420px;
      margin: 80px auto 20px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .en { font-size: 12px; opacity: 0.7; }
    .fa { font-size: 14px; font-weight: bold; }

    img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    audio { width: 100%; }

    .download {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 18px;
      border-radius: 10px;
      background: #00ffff;
      color: black;
      font-weight: bold;
      text-decoration: none;
    }

    /* MENU */
    .menu {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 28px;
      cursor: pointer;
      z-index: 9999;
      color: #00ffff;
    }

    .menu-box {
      display: none;
      position: fixed;
      top: 55px;
      left: 15px;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 10px;
      z-index: 9999;
    }

    .menu-box a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 8px;
      font-size: 14px;
    }

    .menu-box a:hover { color: #00ffff; }

    /* SLIDER (SAME AS INDEX) */
    .music-slider {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;

      display: flex;
      gap: 12px;
      padding: 12px;

      overflow-x: auto;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(14px);

      border-top: 1px solid rgba(255,255,255,0.1);
      z-index: 9999;

      scroll-snap-type: x mandatory;
    }

    .music-slider::-webkit-scrollbar {
      display: none;
    }

    .track {
      flex: 0 0 auto;
      width: 110px;
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      scroll-snap-align: center;
    }

    .track img {
      width: 100px;
      height: 100px;
      border-radius: 14px;
      object-fit: cover;
    }

    .track span {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.8;
    }

    .track:hover span {
      color: #00ffff;
    }
  </style>
</head>

<body>

  <div class="menu" onclick="toggleMenu()">☰</div>

  <div id="menuBox" class="menu-box">
    <a href="index.html">بیوگرافی فوران</a>
    <a href="track1.html">Rafti Ke Nabashi</a>
    <a href="track2.html">Infidel Coward</a>
  </div>

  <div class="box">

    <div class="header">
      <div class="en">Masiha Favaran</div>
      <div class="fa">Rafti Ke Nabashi</div>
    </div>

    <img src="CoverMusic.png" alt="cover">

    <audio controls>
      <source src="RaftiKeNabashi.mp3" type="audio/mpeg">
    </audio>

    <a class="download" href="RaftiKeNabashi.mp3" 🔥دانلود با کیفیت عالی🔥
    </a>

  </div>

  <!-- SLIDER -->
  <div class="music-slider">

    <a class="track" href="track1.html">
      <img src="CoverMusic.png" alt="">
      <span>Rafti Ke Nabashi</span>
    </a>

    <a class="track" href="track2.html">
      <img src="CoverInfidelCoward.jpg" alt="">
      <span>Infidel Coward</span>
    </a>

  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("menuBox");
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }
  </script>

</body>
</html>
